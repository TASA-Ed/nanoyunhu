name: Build Test

on:
  push:
    branches: ["sea"]
  workflow_dispatch:
  pull_request:
    branches: ["sea"]

jobs:
  test:
    name: Build Test on Node 24
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set pnpm 10
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set Node.js 25
        uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Modules
        run: pnpm install --frozen-lockfile

      - name: Build (Ubuntu)
        if: runner.os == 'Linux'
        run: pnpm run build:sea

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: pnpm run build:sea:windows

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: nano-${{ matrix.os }}
          path: ./dist/
          retention-days: 7
