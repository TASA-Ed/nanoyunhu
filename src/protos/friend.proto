syntax = "proto3";

package api.friend;

// 状态信息
message Status {
	// 请求追踪
	int64 trace = 1;
	// 请求状态码，1为正常
	int32 code = 2;
	// 返回消息
	string msg = 3;
}

// 聊天对话列表
message address_book_list {
	Status status = 1;
	repeated Data data = 2;

	message Data {
		string list_name = 1; // 聊天对象列表名称，为"用户"，"我加入的群聊"，"机器人"
		repeated Data_list data = 2;

		// 聊天对象数据
		message Data_list {
			string chat_id = 1; // 聊天对象ID
			string nick = 2; // 聊天对象名称(可能备注)
			string avatar_url = 3; // 聊天对象头像url
			int32 permission_level = 4; // 群权限等级(普通用户无此项(数值为0或无此项),群主100,管理员2),只有群列表才有此项
			string name = 8; // 聊天对象原始名称
		}
	}
}
